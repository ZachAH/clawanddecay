    <!-- ============ Structured Data: ClothingStore (replaces bare Organization) ============ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Organization", "Store"],
      "name": "Claw & Decay",
      "alternateName": "Claw and Decay",
      "url": "https://clawanddecay.com/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://clawanddecay.com/favicon.ico",
        "width": 512,
        "height": 512
      },
      "image": "https://clawanddecay.com/og-image.jpg",
      "description": "Midwest death metal and alternative clothing brand from Milwaukee, WI. Human-made designs by real artists — no AI art. Premium tees, hoodies, and limited drops crafted in small batches.",
      "foundingDate": "2024",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Milwaukee",
        "addressRegion": "WI",
        "addressCountry": "US"
      },
      "priceRange": "$$",
      "currenciesAccepted": "USD",
      "paymentAccepted": "Credit Card, Debit Card, Apple Pay, Google Pay",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Alternative Streetwear",
        "itemListElement": [
          {
            "@type": "OfferCatalog",
            "name": "Graphic Tees"
          },
          {
            "@type": "OfferCatalog",
            "name": "Long Sleeves"
          },
          {
            "@type": "OfferCatalog",
            "name": "Hoodies"
          }
        ]
      },
      "sameAs": []
    }
    </script>

    <!-- ============ Structured Data: WebSite + SearchAction ============ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Claw & Decay",
      "url": "https://clawanddecay.com/",
      "description": "Alternative streetwear for the metal, punk, and outcast scenes.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://clawanddecay.com/merch?tag={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ============ Structured Data: BreadcrumbList (home) ============ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://clawanddecay.com/"
        }
      ]
    }
    </script>
